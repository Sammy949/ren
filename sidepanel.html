<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sylva - Minimalist Notepad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-50 h-screen overflow-hidden">
    <div class="flex flex-col h-full">
      <!-- Top Bar -->
      <div
        class="flex items-center justify-between px-3 py-2 bg-white border-b border-gray-200 shadow-sm"
      >
        <button
          id="hamburgerBtn"
          class="p-2 hover:bg-gray-100 rounded-md transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>
        <div class="flex items-center space-x-2">
          <span
            id="noteTitle"
            class="text-xs font-medium text-gray-700 truncate max-w-32"
            >Untitled Note</span
          >
          <div
            class="w-5 h-5 bg-gradient-to-br from-green-400 to-blue-500 rounded-full flex items-center justify-center"
          >
            <span class="text-white text-xs font-bold">S</span>
          </div>
        </div>
      </div>

      <!-- Main Content Area -->
      <div class="flex-1 relative">
        <!-- Sidebar Overlay -->
        <div
          id="sidebarOverlay"
          class="fixed inset-0 bg-black bg-opacity-20 z-40 opacity-0 pointer-events-none sidebar-overlay"
        ></div>

        <!-- Glassy Sidebar -->
        <div
          id="sidebar"
          class="fixed left-0 top-0 h-full w-72 glass-panel z-50 sidebar-transition transform -translate-x-full shadow-lg"
        >
          <div class="p-4">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-base font-semibold text-gray-800">Sylva Notes</h2>
              <button id="closeSidebar" class="p-1 hover:bg-gray-100 rounded">
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                  ></path>
                </svg>
              </button>
            </div>

            <!-- Menu Actions -->
            <div class="space-y-1 mb-4">
              <button
                id="newNoteBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 4v16m8-8H4"
                  ></path>
                </svg>
                <span class="text-sm font-medium">New Note</span>
              </button>
              <button
                id="exportNotesBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                  ></path>
                </svg>
                <span class="text-sm font-medium">Export Notes</span>
              </button>
              <button
                id="importNotesBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                  ></path>
                </svg>
                <span class="text-sm font-medium">Import Notes</span>
              </button>
              <input
                type="file"
                id="importFileInput"
                accept=".json"
                class="hidden"
              />
            </div>

            <!-- Notes List -->
            <div>
              <h3
                class="text-xs font-medium text-gray-600 mb-2 uppercase tracking-wide"
              >
                Your Notes
              </h3>
              <div id="notesList" class="space-y-1 max-h-80 overflow-y-auto">
                <!-- Notes will be populated here -->
              </div>
            </div>
          </div>
        </div>

        <!-- Writing Canvas -->
        <div class="h-full flex flex-col">
          <textarea
            id="noteContent"
            placeholder="Start writing your thoughts..."
            class="flex-1 w-full p-4 border-none resize-none bg-transparent text-gray-800 placeholder-gray-400 leading-relaxed text-sm"
          ></textarea>
        </div>
      </div>

      <!-- Bottom Status Bar -->
      <div
        class="px-4 py-2 bg-white border-t border-gray-200 flex items-center justify-between text-xs text-gray-600"
      >
        <div class="flex items-center space-x-3">
          <span id="wordCount">0 words</span>
          <span class="text-gray-300">•</span>
          <span id="charCount">0 characters</span>
        </div>
        <div id="autoSaveStatus" class="text-xs text-gray-400">Ready</div>
      </div>
    </div>

    <!-- Rename Modal -->
    <div
      id="renameModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-60 hidden flex items-center justify-center"
    >
      <div class="bg-white rounded-lg p-4 w-80 mx-4 shadow-xl">
        <h3 class="text-base font-semibold mb-3">Rename Note</h3>
        <input
          type="text"
          id="renameInput"
          placeholder="Enter new name..."
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
        />
        <div class="flex justify-end space-x-2 mt-3">
          <button
            id="cancelRename"
            class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm"
          >
            Cancel
          </button>
          <button
            id="confirmRename"
            class="px-3 py-2 bg-blue-500 text-white hover:bg-blue-600 rounded-lg text-sm"
          >
            Rename
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      id="deleteModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-60 hidden flex items-center justify-center"
    >
      <div class="bg-white rounded-lg p-4 w-80 mx-4 shadow-xl">
        <div class="flex items-center mb-3">
          <div
            class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center mr-3"
          >
            <svg
              class="w-4 h-4 text-red-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
          </div>
          <h3 class="text-base font-semibold text-gray-900">Delete Note</h3>
        </div>
        <p class="text-sm text-gray-600 mb-4">
          Are you sure you want to delete "<span
            id="deleteNoteTitle"
            class="font-medium"
          ></span
          >"? This action cannot be undone.
        </p>
        <div class="flex justify-end space-x-2">
          <button
            id="cancelDelete"
            class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm"
          >
            Cancel
          </button>
          <button
            id="confirmDelete"
            class="px-3 py-2 bg-red-500 text-white hover:bg-red-600 rounded-lg text-sm"
          >
            Delete
          </button>
        </div>
      </div>
    </div>
    <!-- Notification Container -->
    <div
      id="notificationContainer"
      class="fixed bottom-4 right-4 z-70 space-y-2"
    ></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
