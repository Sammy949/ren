<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sylva - Minimalist Notepad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-50 h-screen overflow-hidden">
    <!-- Skip Link for keyboard users -->
    <a href="#noteContent" class="skip-link">Skip to editor</a>

    <div class="flex flex-col h-full">
      <!-- Top Bar -->
      <header
        class="flex items-center justify-between px-3 py-2 bg-white border-b border-gray-200 shadow-sm"
        role="banner"
      >
        <button
          id="hamburgerBtn"
          class="p-2 hover:bg-gray-100 rounded-md transition-colors"
          aria-label="Open notes menu"
          aria-expanded="false"
          aria-controls="sidebar"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>
        <div class="flex items-center space-x-2">
          <!-- Editable Note Title -->
          <div id="noteTitleContainer" class="relative">
            <h1
              id="noteTitle"
              class="text-xs font-medium text-gray-700 truncate max-w-32 cursor-pointer hover:text-gray-900"
              aria-live="polite"
              title="Click to edit title"
            >
              Untitled Note
            </h1>
            <input
              type="text"
              id="noteTitleInput"
              class="hidden text-xs font-medium text-gray-700 max-w-32 px-1 py-0.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
              aria-label="Edit note title"
            />
          </div>
          <div class="header-logo" aria-hidden="true">
            <span class="header-logo-text">S</span>
          </div>
        </div>
      </header>

      <!-- Main Content Area -->
      <main class="flex-1 relative" role="main">
        <!-- Sidebar Overlay -->
        <div
          id="sidebarOverlay"
          class="fixed inset-0 bg-black bg-opacity-20 z-40 opacity-0 pointer-events-none sidebar-overlay"
          aria-hidden="true"
        ></div>

        <!-- Glassy Sidebar -->
        <nav
          id="sidebar"
          class="fixed left-0 top-0 h-full w-72 glass-panel z-50 sidebar-transition transform -translate-x-full shadow-lg"
          role="navigation"
          aria-label="Notes navigation"
          aria-hidden="true"
        >
          <div class="p-4">
            <div class="flex items-center justify-between mb-4">
              <h2
                class="text-base font-semibold text-gray-800"
                id="sidebarTitle"
              >
                Sylva Notes
              </h2>
              <button
                id="closeSidebar"
                class="p-1 hover:bg-gray-100 rounded"
                aria-label="Close notes menu"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                  ></path>
                </svg>
              </button>
            </div>

            <!-- Search Bar -->
            <div class="search-container mb-3">
              <div class="search-input-wrapper">
                <svg
                  class="search-icon"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                  ></path>
                </svg>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Search notes..."
                  class="search-input"
                  aria-label="Search notes"
                />
                <button
                  id="clearSearchBtn"
                  class="clear-search-btn hidden"
                  aria-label="Clear search"
                >
                  <svg
                    class="w-3 h-3"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M6 18L18 6M6 6l12 12"
                    ></path>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Notes List (Full Height) -->
            <div class="flex-1 flex flex-col min-h-0">
              <h3
                id="notesListLabel"
                class="text-xs font-medium text-gray-600 mb-2 uppercase tracking-wide"
              >
                Your Notes
              </h3>
              <div
                id="notesList"
                class="flex-1 space-y-1 overflow-y-auto"
                role="listbox"
                aria-labelledby="notesListLabel"
                tabindex="0"
              >
                <!-- Notes will be populated here -->
              </div>
            </div>

            <!-- Sidebar Actions (Bottom) -->
            <div
              class="space-y-1 pt-4 border-t border-gray-200 mt-4"
              role="group"
              aria-label="Note actions"
            >
              <button
                id="newNoteBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
                aria-label="Create new note"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 4v16m8-8H4"
                  ></path>
                </svg>
                <span class="text-sm font-medium">New Note</span>
              </button>
              <button
                id="settingsBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
                aria-label="Open settings"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                  ></path>
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  ></path>
                </svg>
                <span class="text-sm font-medium">Settings</span>
              </button>
              <!-- Hidden file input for import -->
              <input
                type="file"
                id="importFileInput"
                accept=".json"
                class="hidden"
                aria-label="Select notes file to import"
              />
            </div>
          </div>
        </nav>

        <!-- Writing Canvas -->
        <div class="h-full flex flex-col">
          <!-- Editor Toolbar -->
          <div
            class="editor-toolbar"
            role="toolbar"
            aria-label="Text formatting"
          >
            <!-- Primary actions - always visible -->
            <div class="toolbar-primary">
              <button
                class="editor-toolbar-btn"
                data-action="undo"
                title="Undo (Ctrl+Z)"
                aria-label="Undo"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 10h10a5 5 0 015 5v2M3 10l4-4m-4 4l4 4"
                  ></path>
                </svg>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="redo"
                title="Redo (Ctrl+Y)"
                aria-label="Redo"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 10h-10a5 5 0 00-5 5v2M21 10l-4-4m4 4l-4 4"
                  ></path>
                </svg>
              </button>
              <div class="editor-toolbar-divider" aria-hidden="true"></div>
              <button
                class="editor-toolbar-btn"
                data-action="bold"
                title="Bold (Ctrl+B)"
                aria-label="Bold"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"
                  ></path>
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"
                  ></path>
                </svg>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="italic"
                title="Italic (Ctrl+I)"
                aria-label="Italic"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10 4h4m-2 0v16m-4 0h8"
                  ></path>
                </svg>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="underline"
                title="Underline (Ctrl+U)"
                aria-label="Underline"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M7 4v7a5 5 0 0010 0V4M5 21h14"
                  ></path>
                </svg>
              </button>
            </div>

            <!-- Headings - individual buttons on wide screens -->
            <div class="toolbar-headings-expanded">
              <div class="editor-toolbar-divider" aria-hidden="true"></div>
              <button
                class="editor-toolbar-btn"
                data-action="h1"
                title="Heading 1"
                aria-label="Heading 1"
              >
                <span class="text-xs font-bold">H1</span>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="h2"
                title="Heading 2"
                aria-label="Heading 2"
              >
                <span class="text-xs font-bold">H2</span>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="h3"
                title="Heading 3"
                aria-label="Heading 3"
              >
                <span class="text-xs font-bold">H3</span>
              </button>
            </div>

            <!-- Headings dropdown - visible on narrow screens -->
            <div class="toolbar-headings-compact">
              <div class="editor-toolbar-divider" aria-hidden="true"></div>
              <button
                id="toolbarHeadingsBtn"
                class="editor-toolbar-btn"
                title="Headings"
                aria-label="Headings"
                aria-expanded="false"
                aria-haspopup="true"
              >
                <span class="text-xs font-bold">H</span>
              </button>
              <!-- Headings dropdown -->
              <div
                id="toolbarHeadingsMenu"
                class="toolbar-dropdown hidden"
                role="menu"
              >
                <button
                  class="toolbar-dropdown-item"
                  data-action="h1"
                  role="menuitem"
                >
                  <span class="dropdown-icon-text">H1</span>
                  <span>Heading 1</span>
                </button>
                <button
                  class="toolbar-dropdown-item"
                  data-action="h2"
                  role="menuitem"
                >
                  <span class="dropdown-icon-text">H2</span>
                  <span>Heading 2</span>
                </button>
                <button
                  class="toolbar-dropdown-item"
                  data-action="h3"
                  role="menuitem"
                >
                  <span class="dropdown-icon-text">H3</span>
                  <span>Heading 3</span>
                </button>
              </div>
            </div>

            <!-- List dropdown - always visible -->
            <div class="toolbar-lists">
              <div class="editor-toolbar-divider" aria-hidden="true"></div>
              <button
                id="toolbarListsBtn"
                class="editor-toolbar-btn"
                title="Lists"
                aria-label="Lists"
                aria-expanded="false"
                aria-haspopup="true"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"
                  ></path>
                </svg>
              </button>
              <!-- Lists dropdown menu -->
              <div
                id="toolbarListsMenu"
                class="toolbar-dropdown hidden"
                role="menu"
              >
                <button
                  class="toolbar-dropdown-item"
                  data-action="bulletList"
                  role="menuitem"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4 6h16M4 12h16M4 18h16"
                    ></path>
                  </svg>
                  <span>Bullet List</span>
                </button>
                <button
                  class="toolbar-dropdown-item"
                  data-action="numberedList"
                  role="menuitem"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stro
                      ke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M7 8h10M7 12h10M7 16h10M3 8h.01M3 12h.01M3 16h.01"
                    ></path>
                  </svg>
                  <span>Numbered List</span>
                </button>
                <div class="toolbar-dropdown-divider"></div>
                <button
                  class="toolbar-dropdown-item"
                  data-action="insertCheckbox"
                  role="menuitem"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
                    ></path>
                  </svg>
                  <span>Checklist</span>
                </button>
              </div>
            </div>

            <!-- Block actions - visible on wide screens only -->
            <div class="toolbar-blocks">
              <button
                class="editor-toolbar-btn"
                data-action="strikethrough"
                title="Strikethrough"
                aria-label="Strikethrough"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 3v6m0 6v6M5 12h14"
                  ></path>
                </svg>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="blockquote"
                title="Quote"
                aria-label="Blockquote"
              >
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M4.583 17.321C3.553 16.227 3 15 3 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179zm10 0C13.553 16.227 13 15 13 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179z"
                  ></path>
                </svg>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="code"
                title="Code"
                aria-label="Inline Code"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
                  ></path>
                </svg>
              </button>
              <button
                class="editor-toolbar-btn"
                data-action="hr"
                title="Horizontal Line"
                aria-label="Horizontal Line"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M5 12h14"
                  ></path>
                </svg>
              </button>
            </div>

            <!-- More menu - visible on narrow screens -->
            <div class="toolbar-more">
              <button
                id="toolbarMoreBtn"
                class="editor-toolbar-btn"
                title="More formatting options"
                aria-label="More formatting options"
                aria-expanded="false"
                aria-haspopup="true"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"
                  ></path>
                </svg>
              </button>

              <!-- Dropdown menu - strikethrough + formatting options -->
              <div
                id="toolbarMoreMenu"
                class="toolbar-dropdown hidden"
                role="menu"
              >
                <button
                  class="toolbar-dropdown-item"
                  data-action="strikethrough"
                  role="menuitem"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 3v6m0 6v6M5 12h14"
                    ></path>
                  </svg>
                  <span>Strikethrough</span>
                </button>
                <div class="toolbar-dropdown-divider"></div>
                <button
                  class="toolbar-dropdown-item"
                  data-action="blockquote"
                  role="menuitem"
                >
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M4.583 17.321C3.553 16.227 3 15 3 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179zm10 0C13.553 16.227 13 15 13 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 01-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179z"
                    ></path>
                  </svg>
                  <span>Quote</span>
                </button>
                <button
                  class="toolbar-dropdown-item"
                  data-action="code"
                  role="menuitem"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
                    ></path>
                  </svg>
                  <span>Code</span>
                </button>
                <button
                  class="toolbar-dropdown-item"
                  data-action="hr"
                  role="menuitem"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M5 12h14"
                    ></path>
                  </svg>
                  <span>Horizontal Line</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Rich Text Editor -->
          <div
            id="noteContent"
            class="sylva-editor"
            role="textbox"
            aria-label="Note content editor"
            aria-describedby="editorStatus"
            aria-multiline="true"
            data-placeholder="Start writing... (Try # for headings, ** for bold, - for lists)"
          ></div>
        </div>
      </main>

      <!-- Bottom Status Bar -->
      <footer
        class="px-4 py-2 bg-white border-t border-gray-200 flex items-center justify-between text-xs text-gray-600"
        role="contentinfo"
      >
        <div class="flex items-center space-x-3" id="editorStatus">
          <span id="wordCount" aria-live="polite" aria-atomic="true"
            >0 words</span
          >
          <span class="text-gray-300" aria-hidden="true">•</span>
          <span id="charCount" aria-live="polite" aria-atomic="true"
            >0 characters</span
          >
        </div>
        <div class="flex items-center space-x-2">
          <div
            id="autoSaveStatus"
            class="text-xs text-gray-400"
            role="status"
            aria-live="polite"
          >
            Ready
          </div>
          <!-- Info icon with tooltip -->
          <div
            class="info-tooltip-container"
            style="
              position: relative;
              width: 22px;
              height: 22px;
              flex-shrink: 0;
            "
          >
            <button
              id="shortcutsInfoBtn"
              style="
                width: 22px;
                height: 22px;
                padding: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                color: #9ca3af;
              "
              aria-label="Keyboard shortcuts info"
            >
              <svg
                style="width: 14px; height: 14px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
            </button>
            <!-- Tooltip -->
            <div class="shortcuts-tooltip">
              Press
              <kbd
                style="padding: 0 4px; background: #374151; border-radius: 2px"
                >Ctrl+/</kbd
              >
              for shortcuts
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- Rename Modal -->
    <div
      id="renameModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-60 hidden flex items-center justify-center"
      role="dialog"
      aria-modal="true"
      aria-labelledby="renameModalTitle"
      aria-hidden="true"
    >
      <div class="bg-white rounded-lg p-4 w-80 mx-4 shadow-xl" role="document">
        <h3 id="renameModalTitle" class="text-base font-semibold mb-3">
          Rename Note
        </h3>
        <label for="renameInput" class="sr-only">New note name</label>
        <input
          type="text"
          id="renameInput"
          placeholder="Enter new name..."
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          aria-describedby="renameModalTitle"
        />
        <div class="flex justify-end space-x-2 mt-3">
          <button
            id="cancelRename"
            class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm"
            aria-label="Cancel rename"
          >
            Cancel
          </button>
          <button
            id="confirmRename"
            class="px-3 py-2 bg-blue-500 text-white hover:bg-blue-600 rounded-lg text-sm"
            aria-label="Confirm rename"
          >
            Rename
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      id="deleteModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-60 hidden flex items-center justify-center"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="deleteModalTitle"
      aria-describedby="deleteModalDesc"
      aria-hidden="true"
    >
      <div class="bg-white rounded-lg p-4 w-80 mx-4 shadow-xl" role="document">
        <div class="flex items-center mb-3">
          <div
            class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center mr-3"
            aria-hidden="true"
          >
            <svg
              class="w-4 h-4 text-red-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
          </div>
          <h3
            id="deleteModalTitle"
            class="text-base font-semibold text-gray-900"
          >
            Delete Note
          </h3>
        </div>
        <p id="deleteModalDesc" class="text-sm text-gray-600 mb-4">
          Are you sure you want to delete "<span
            id="deleteNoteTitle"
            class="font-medium"
          ></span
          >"? This action cannot be undone.
        </p>
        <div class="flex justify-end space-x-2">
          <button
            id="cancelDelete"
            class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm"
            aria-label="Cancel delete"
          >
            Cancel
          </button>
          <button
            id="confirmDelete"
            class="px-3 py-2 bg-red-500 text-white hover:bg-red-600 rounded-lg text-sm"
            aria-label="Confirm delete"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Notification Container - Screen reader announcements -->
    <div
      id="notificationContainer"
      class="fixed bottom-4 right-4 z-70 space-y-2"
      role="log"
      aria-live="polite"
      aria-label="Notifications"
    ></div>

    <!-- Screen reader announcements region -->
    <div
      id="srAnnouncements"
      class="sr-only"
      role="status"
      aria-live="assertive"
      aria-atomic="true"
    ></div>

    <script src="storage.js"></script>
    <script src="editor.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
