<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sylva - Minimalist Notepad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-gray-50 h-screen overflow-hidden">
    <!-- Skip Link for keyboard users -->
    <a href="#noteContent" class="skip-link">Skip to editor</a>

    <div class="flex flex-col h-full">
      <!-- Top Bar -->
      <header
        class="flex items-center justify-between px-3 py-2 bg-white border-b border-gray-200 shadow-sm"
        role="banner"
      >
        <button
          id="hamburgerBtn"
          class="p-2 hover:bg-gray-100 rounded-md transition-colors"
          aria-label="Open notes menu"
          aria-expanded="false"
          aria-controls="sidebar"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>
        <div class="flex items-center space-x-2">
          <!-- Editable Note Title -->
          <div id="noteTitleContainer" class="relative">
            <h1
              id="noteTitle"
              class="text-xs font-medium text-gray-700 truncate max-w-32 cursor-pointer hover:text-gray-900"
              aria-live="polite"
              title="Click to edit title"
            >
              Untitled Note
            </h1>
            <input
              type="text"
              id="noteTitleInput"
              class="hidden text-xs font-medium text-gray-700 max-w-32 px-1 py-0.5 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
              aria-label="Edit note title"
            />
          </div>
          <div
            class="w-5 h-5 bg-gradient-to-br from-green-400 to-blue-500 rounded-full flex items-center justify-center"
            aria-hidden="true"
          >
            <span class="text-white text-xs font-bold">S</span>
          </div>
        </div>
      </header>

      <!-- Main Content Area -->
      <main class="flex-1 relative" role="main">
        <!-- Sidebar Overlay -->
        <div
          id="sidebarOverlay"
          class="fixed inset-0 bg-black bg-opacity-20 z-40 opacity-0 pointer-events-none sidebar-overlay"
          aria-hidden="true"
        ></div>

        <!-- Glassy Sidebar -->
        <nav
          id="sidebar"
          class="fixed left-0 top-0 h-full w-72 glass-panel z-50 sidebar-transition transform -translate-x-full shadow-lg"
          role="navigation"
          aria-label="Notes navigation"
          aria-hidden="true"
        >
          <div class="p-4">
            <div class="flex items-center justify-between mb-4">
              <h2
                class="text-base font-semibold text-gray-800"
                id="sidebarTitle"
              >
                Sylva Notes
              </h2>
              <button
                id="closeSidebar"
                class="p-1 hover:bg-gray-100 rounded"
                aria-label="Close notes menu"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 18L18 6M6 6l12 12"
                  ></path>
                </svg>
              </button>
            </div>
            <!-- Search Bar -->
            <div class="mb-4 relative search-container">
              <label for="searchNotes" class="sr-only">Search notes</label>
              <div
                class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-gray-400"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                  ></path>
                </svg>
              </div>
              <input
                type="text"
                id="searchNotes"
                placeholder="Search notes..."
                class="block w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                aria-label="Search notes"
              />
            </div>

            <!-- Notes List (Full Height) -->
            <div class="flex-1 flex flex-col min-h-0">
              <h3
                id="notesListLabel"
                class="text-xs font-medium text-gray-600 mb-2 uppercase tracking-wide"
              >
                Your Notes
              </h3>
              <div
                id="notesList"
                class="flex-1 space-y-1 overflow-y-auto"
                role="listbox"
                aria-labelledby="notesListLabel"
                tabindex="0"
              >
                <!-- Notes will be populated here -->
              </div>
            </div>

            <!-- Sidebar Actions (Bottom) -->
            <div
              class="space-y-1 pt-4 border-t border-gray-200 mt-4"
              role="group"
              aria-label="Note actions"
            >
              <button
                id="newNoteBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
                aria-label="Create new note"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 4v16m8-8H4"
                  ></path>
                </svg>
                <span class="text-sm font-medium">New Note</span>
              </button>
              <button
                id="settingsBtn"
                class="w-full p-2 text-left hover:bg-gray-100 rounded-lg transition-colors menu-item flex items-center space-x-2"
                aria-label="Open settings"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                  ></path>
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  ></path>
                </svg>
                <span class="text-sm font-medium">Settings</span>
              </button>
              <!-- Hidden file input for import -->
              <input
                type="file"
                id="importFileInput"
                accept=".json"
                class="hidden"
                aria-label="Select notes file to import"
              />
            </div>
          </div>
        </nav>

        <!-- Writing Canvas -->
        <div class="h-full flex flex-col">
          <label for="noteContent" class="sr-only">Note content</label>
          <textarea
            id="noteContent"
            placeholder="Start writing your thoughts..."
            class="flex-1 w-full p-4 border-none resize-none bg-transparent text-gray-800 placeholder-gray-400 leading-relaxed text-sm"
            aria-label="Note content editor"
            aria-describedby="editorStatus"
          ></textarea>
        </div>
      </main>

      <!-- Bottom Status Bar -->
      <footer
        class="px-4 py-2 bg-white border-t border-gray-200 flex items-center justify-between text-xs text-gray-600"
        role="contentinfo"
      >
        <div class="flex items-center space-x-3" id="editorStatus">
          <span id="wordCount" aria-live="polite" aria-atomic="true"
            >0 words</span
          >
          <span class="text-gray-300" aria-hidden="true">•</span>
          <span id="charCount" aria-live="polite" aria-atomic="true"
            >0 characters</span
          >
        </div>
        <div class="flex items-center space-x-2">
          <div
            id="autoSaveStatus"
            class="text-xs text-gray-400"
            role="status"
            aria-live="polite"
          >
            Ready
          </div>
          <!-- Info icon with tooltip -->
          <div
            class="info-tooltip-container"
            style="
              position: relative;
              width: 22px;
              height: 22px;
              flex-shrink: 0;
            "
          >
            <button
              id="shortcutsInfoBtn"
              style="
                width: 22px;
                height: 22px;
                padding: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                color: #9ca3af;
              "
              aria-label="Keyboard shortcuts info"
            >
              <svg
                style="width: 14px; height: 14px"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
            </button>
            <!-- Tooltip -->
            <div class="shortcuts-tooltip">
              Press
              <kbd
                style="padding: 0 4px; background: #374151; border-radius: 2px"
                >Ctrl+/</kbd
              >
              for shortcuts
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- Rename Modal -->
    <div
      id="renameModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-60 hidden flex items-center justify-center"
      role="dialog"
      aria-modal="true"
      aria-labelledby="renameModalTitle"
      aria-hidden="true"
    >
      <div class="bg-white rounded-lg p-4 w-80 mx-4 shadow-xl" role="document">
        <h3 id="renameModalTitle" class="text-base font-semibold mb-3">
          Rename Note
        </h3>
        <label for="renameInput" class="sr-only">New note name</label>
        <input
          type="text"
          id="renameInput"
          placeholder="Enter new name..."
          class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          aria-describedby="renameModalTitle"
        />
        <div class="flex justify-end space-x-2 mt-3">
          <button
            id="cancelRename"
            class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm"
            aria-label="Cancel rename"
          >
            Cancel
          </button>
          <button
            id="confirmRename"
            class="px-3 py-2 bg-blue-500 text-white hover:bg-blue-600 rounded-lg text-sm"
            aria-label="Confirm rename"
          >
            Rename
          </button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      id="deleteModal"
      class="fixed inset-0 bg-black bg-opacity-50 z-60 hidden flex items-center justify-center"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="deleteModalTitle"
      aria-describedby="deleteModalDesc"
      aria-hidden="true"
    >
      <div class="bg-white rounded-lg p-4 w-80 mx-4 shadow-xl" role="document">
        <div class="flex items-center mb-3">
          <div
            class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center mr-3"
            aria-hidden="true"
          >
            <svg
              class="w-4 h-4 text-red-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              ></path>
            </svg>
          </div>
          <h3
            id="deleteModalTitle"
            class="text-base font-semibold text-gray-900"
          >
            Delete Note
          </h3>
        </div>
        <p id="deleteModalDesc" class="text-sm text-gray-600 mb-4">
          Are you sure you want to delete "<span
            id="deleteNoteTitle"
            class="font-medium"
          ></span
          >"? This action cannot be undone.
        </p>
        <div class="flex justify-end space-x-2">
          <button
            id="cancelDelete"
            class="px-3 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm"
            aria-label="Cancel delete"
          >
            Cancel
          </button>
          <button
            id="confirmDelete"
            class="px-3 py-2 bg-red-500 text-white hover:bg-red-600 rounded-lg text-sm"
            aria-label="Confirm delete"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- Notification Container - Screen reader announcements -->
    <div
      id="notificationContainer"
      class="fixed bottom-4 right-4 z-70 space-y-2"
      role="log"
      aria-live="polite"
      aria-label="Notifications"
    ></div>

    <!-- Screen reader announcements region -->
    <div
      id="srAnnouncements"
      class="sr-only"
      role="status"
      aria-live="assertive"
      aria-atomic="true"
    ></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
